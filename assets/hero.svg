<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 280" role="img" aria-label="Laurits Mouritsen, IT Strategy &amp; Architecture, Automation, intellens.ai">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#0a0e1a"/>
      <stop offset="55%"  stop-color="#0f2340"/>
      <stop offset="100%" stop-color="#1f4dc4"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#4f8cff"/>
      <stop offset="50%"  stop-color="#a78bff"/>
      <stop offset="100%" stop-color="#f0a060"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#4f8cff" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#4f8cff" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.2"/>
    </filter>
  </defs>

  <!-- Background gradient -->
  <rect width="1200" height="280" fill="url(#bg)"/>

  <!-- Animated radial glow (slow pulse) -->
  <circle cx="280" cy="140" r="180" fill="url(#glow)">
    <animate attributeName="r" values="160;220;160" dur="9s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;1;0.6" dur="9s" repeatCount="indefinite"/>
  </circle>
  <circle cx="920" cy="120" r="220" fill="url(#glow)" opacity="0.7">
    <animate attributeName="r" values="200;260;200" dur="11s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.4;0.85;0.4" dur="11s" repeatCount="indefinite"/>
  </circle>

  <!-- Subtle grid (data-engineering vibe) -->
  <g stroke="#ffffff" stroke-opacity="0.05" stroke-width="1">
    <path d="M0 70 L1200 70"/>
    <path d="M0 140 L1200 140"/>
    <path d="M0 210 L1200 210"/>
    <path d="M200 0 L200 280"/>
    <path d="M400 0 L400 280"/>
    <path d="M600 0 L600 280"/>
    <path d="M800 0 L800 280"/>
    <path d="M1000 0 L1000 280"/>
  </g>

  <!-- Animated sweep line (data-flow feel) -->
  <line x1="0" y1="140" x2="1200" y2="140" stroke="url(#accent)" stroke-width="1.5" stroke-dasharray="6 12" opacity="0.55">
    <animate attributeName="stroke-dashoffset" from="0" to="-180" dur="6s" repeatCount="indefinite"/>
  </line>

  <!-- Headline -->
  <text x="600" y="118" text-anchor="middle"
        font-family="'Inter','SF Pro Display','Segoe UI',system-ui,sans-serif"
        font-size="56" font-weight="700" fill="#ffffff"
        letter-spacing="-1.2">
    Laurits Mouritsen
  </text>

  <!-- Underline (accent gradient) -->
  <rect x="490" y="138" width="220" height="3" fill="url(#accent)" rx="1.5">
    <animate attributeName="width" values="0;220;220" dur="1.6s" fill="freeze"/>
    <animate attributeName="x"     values="600;490;490" dur="1.6s" fill="freeze"/>
  </rect>

  <!-- Subtitle -->
  <text x="600" y="178" text-anchor="middle"
        font-family="'Fira Code','JetBrains Mono','SF Mono',monospace"
        font-size="18" font-weight="500" fill="#bfd6f6">
    IT Strategy &amp; Architecture · Automation specialist
  </text>

  <!-- Tag-row -->
  <g font-family="'Fira Code','JetBrains Mono',monospace" font-size="13" fill="#8aa6e6">
    <text x="600" y="218" text-anchor="middle">
      <tspan fill="#4f8cff">AWS</tspan>
      <tspan dx="14" fill="#8aa6e6">·</tspan>
      <tspan dx="14" fill="#3776AB">Python</tspan>
      <tspan dx="14" fill="#8aa6e6">·</tspan>
      <tspan dx="14" fill="#009688">FastAPI</tspan>
      <tspan dx="14" fill="#8aa6e6">·</tspan>
      <tspan dx="14" fill="#a78bff">PostgreSQL</tspan>
      <tspan dx="14" fill="#8aa6e6">·</tspan>
      <tspan dx="14" fill="#5391FE">PowerShell</tspan>
    </text>
  </g>

  <!-- bottom-right caption -->
  <text x="1180" y="262" text-anchor="end"
        font-family="'Fira Code',monospace" font-size="11" fill="#6c7383">
    intellens.ai
  </text>
</svg>
